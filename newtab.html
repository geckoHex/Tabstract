<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <link rel="icon" href="extension/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>

  <!-- ── Left Panel: Clock + Search ────────────────────────────────── -->
  <div class="left-panel">
    <div class="left-inner">
      <div class="clock" id="clock" aria-live="polite"></div>
      <div class="left-search-stack">
        <form class="search-form" id="search-form" autocomplete="off">
          <div class="search-wrapper">
            <img class="search-icon" src="icons/google-logo.svg" alt="" width="17" height="17" />
            <input
              type="text"
              id="search-input"
              class="search-input"
              placeholder="Search the web..."
              spellcheck="false"
              autofocus
            />
            <button type="button" class="clear-btn" id="clear-btn" aria-label="Clear search">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </form>

        <div class="bookmark-search-box">
          <form class="bookmark-search-form" id="bookmark-search-form" autocomplete="off">
            <div class="search-wrapper">
              <img class="search-icon" src="icons/bookmarks.svg" alt="" width="17" height="17" />
              <input
                type="text"
                id="bookmark-search-input"
                class="search-input"
                placeholder="Search bookmarks..."
                spellcheck="false"
                aria-label="Search bookmarks"
                aria-controls="bookmark-search-results"
                aria-autocomplete="list"
              />
              <button type="button" class="clear-btn" id="bookmark-clear-btn" aria-label="Clear bookmark search">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </div>
          </form>
          <ul class="bookmark-search-results" id="bookmark-search-results" role="listbox" aria-label="Bookmark matches" hidden></ul>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Right Panel: Bookmarks ─────────────────────────────────────── -->
  <div class="right-panel">

    <!-- Toolbar: path bar + actions -->
    <div class="toolbar">
      <nav class="path-bar" id="path-bar" aria-label="Bookmark path"></nav>
      <div class="toolbar-actions">
        <button class="action-btn" id="add-folder-btn" title="New folder">
          <img class="toolbar-icon" src="icons/folder-simple-plus.svg" alt="" width="13" height="13" />
          New Folder
        </button>
        <button class="action-btn" id="add-link-btn" title="Add bookmark">
          <img class="toolbar-icon" src="icons/plus.svg" alt="" width="13" height="13" />
          Add Link
        </button>
      </div>
    </div>

    <!-- Icon grid -->
    <div class="grid-scroll" id="grid-scroll">
      <div class="icon-grid" id="icon-grid"></div>
    </div>

  </div>

  <!-- ── Modal: Add Bookmark ────────────────────────────────────────── -->
  <div class="modal-overlay" id="link-modal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h3 id="link-modal-title">Add Bookmark</h3>
        <button class="modal-close" id="link-modal-close" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="link-title">Title</label>
          <input type="text" id="link-title" placeholder="My Site" autocomplete="off" />
        </div>
        <div class="field">
          <label for="link-url">URL</label>
          <input type="url" id="link-url" placeholder="https://example.com" autocomplete="off" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="link-cancel">Cancel</button>
        <button class="btn-primary" id="link-save" type="button">Add Bookmark</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: New Folder ──────────────────────────────────────────── -->
  <div class="modal-overlay" id="folder-modal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h3 id="folder-modal-title">New Folder</h3>
        <button class="modal-close" id="folder-modal-close" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="folder-name">Name</label>
          <input type="text" id="folder-name" placeholder="Work, Personal, Reading..." autocomplete="off" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="folder-cancel">Cancel</button>
        <button class="btn-primary" id="folder-save" type="button">Create</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: Confirm delete ──────────────────────────────────────── -->
  <div class="modal-overlay modal-overlay-elevated" id="delete-confirm-modal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h3 id="delete-modal-title">Delete?</h3>
        <button class="modal-close" id="delete-modal-close" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <p class="modal-message" id="delete-modal-message"></p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="delete-cancel" type="button">Cancel</button>
        <button class="btn-primary" id="delete-confirm" type="button">Delete</button>
      </div>
    </div>
  </div>

  <!-- Context menu for bookmark icons (right-click) -->
  <div class="context-menu" id="item-context-menu" hidden role="menu" aria-label="Bookmark actions">
    <button type="button" class="context-menu-item" id="ctx-edit" role="menuitem">
      <img class="context-menu-icon" src="icons/pencil.svg" alt="" width="14" height="14" />
      Edit
    </button>
    <button type="button" class="context-menu-item" id="ctx-delete" role="menuitem">
      <img class="context-menu-icon" src="icons/trash.svg" alt="" width="14" height="14" />
      Delete
    </button>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
